# meta_schema.yml — JSON Schema Draft 07 in YAML.
# Frontmatter contract for all notes under content/.
# The validator injects meta_tags.yml keys into tags.items.enum at runtime.
# See INITIAL_ARCHITECTURE.md §5 for the full design.
$schema: "http://json-schema.org/draft-07/schema#"
title: "Galaxy Workflow Foundry Frontmatter"
type: object
required: [type, tags, status, created, revised, revision, ai_generated, summary]

properties:
  type:
    type: string
    enum: [mold, pattern, source-pattern, cli-command, pipeline, research, schema]
  tags:
    type: array
    items:
      type: string
      enum: []  # injected at runtime from meta_tags.yml
    minItems: 1
  status:
    type: string
    enum: [draft, reviewed, revised, stale, archived]
  created:
    type: string
    format: date  # advisory; actual validation in custom code
  revised:
    type: string
    format: date
  revision:
    type: integer
    minimum: 1
  ai_generated:
    type: boolean
  summary:
    type: string
    minLength: 20
    maxLength: 160

  # --- Common optional ---
  title:
    type: string
  aliases:
    type: array
    items:
      type: string
  pattern_kind:
    type: string
    enum: [operation, recipe, moc]
  evidence:
    type: string
    enum: [corpus-observed, structurally-verified, corpus-and-verified, hypothesis]
  sources:
    type: array
    minItems: 1
    items:
      type: string
      minLength: 1
  source_pattern_kind:
    type: string
    enum: [moc, channel-shape, operator, lifecycle, review-trigger]
  implemented_by_patterns:
    type: array
    minItems: 1
    items:
      type: string
      pattern: "^\\[\\[.+\\]\\]$"
  review_triggers:
    type: array
    items:
      type: string
      minLength: 1

  # --- Wiki-link fields (regex-checked) ---
  parent_pattern:
    type: string
    pattern: "^\\[\\[.+\\]\\]$"
  related_notes:
    type: array
    items:
      type: string
      pattern: "^\\[\\[.+\\]\\]$"
  related_patterns:
    type: array
    items:
      type: string
      pattern: "^\\[\\[.+\\]\\]$"
  related_molds:
    type: array
    items:
      type: string
      pattern: "^\\[\\[.+\\]\\]$"
  verification_paths:
    type: array
    items:
      type: string
  iwc_exemplars:
    type: array
    items:
      type: object
      required: [workflow, why, confidence]
      additionalProperties: false
      properties:
        workflow:
          type: string
          minLength: 1
        steps:
          type: array
          minItems: 1
          items:
            type: object
            additionalProperties: false
            anyOf:
              - required: [label]
              - required: [id]
            properties:
              label:
                type: string
                minLength: 1
              id:
                oneOf:
                  - type: string
                    minLength: 1
                  - type: integer
        why:
          type: string
          minLength: 1
        confidence:
          type: string
          enum: [high, medium, low]

  # --- Mold fields ---
  name:
    type: string
  axis:
    type: string
    enum: [source-specific, target-specific, tool-specific, generic]
  source:
    type: string
    enum: [paper, nextflow, cwl, snakemake]
  target:
    type: string
    enum: [galaxy, cwl, web, generic]
  tool:
    type: string
    enum: [gxwf, planemo]
  patterns:
    type: array
    items:
      type: string
      pattern: "^\\[\\[.+\\]\\]$"
  cli_commands:
    type: array
    items:
      type: string
      pattern: "^\\[\\[.+\\]\\]$"
  prompts:
    type: array
    items:
      type: string
      pattern: "^\\[\\[.+\\]\\]$"
  input_schemas:
    type: array
    items:
      type: string
      pattern: "^\\[\\[.+\\]\\]$"
  output_schemas:
    type: array
    items:
      type: string
      pattern: "^\\[\\[.+\\]\\]$"
  # Typed artifact handoffs between Molds. Producer side: this Mold emits
  # `id` as one of its outputs. Consumer side (input_artifacts): this Mold
  # requires `id` to be supplied by a prior Mold in a Pipeline run. ids are
  # bare slugs (kebab); the cross-file validator checks every consumer id
  # resolves to some producer id in the corpus. Multiple Molds may produce
  # the same id (e.g. branch outputs that satisfy a single downstream input).
  output_artifacts:
    type: array
    items:
      type: object
      required: [id, kind, default_filename, description]
      additionalProperties: false
      properties:
        id:
          type: string
          pattern: "^[a-z][a-z0-9-]*$"
        kind:
          type: string
          enum: [json, markdown, yaml, text, other]
        default_filename:
          type: string
          minLength: 1
        schema:
          type: string
          pattern: "^\\[\\[.+\\]\\]$"
        description:
          type: string
          minLength: 20
  # Schema is producer-owned: declare `schema:` on the producer Mold's
  # `output_artifacts[]` entry. Consumers inherit the contract by binding to
  # the same `id`; cast-mold surfaces the inherited schema on each consumer
  # input in the resolved provenance. To list a runtime-validation hint
  # without a producer commitment (e.g. external/free-floating input), use
  # the top-level `input_schemas` array instead.
  input_artifacts:
    type: array
    items:
      type: object
      required: [id, description]
      additionalProperties: false
      properties:
        id:
          type: string
          pattern: "^[a-z][a-z0-9-]*$"
        description:
          type: string
          minLength: 20
  examples:
    type: array
    items:
      type: string
  references:
    type: array
    items:
      type: object
      required: [kind, ref, used_at, load, mode, evidence]
      additionalProperties: false
      properties:
        kind:
          type: string
          enum: []  # injected at runtime from reference_contract.yml
        ref:
          type: string
          minLength: 1
        used_at:
          type: string
          enum: []  # injected at runtime from reference_contract.yml
        load:
          type: string
          enum: []  # injected at runtime from reference_contract.yml
        mode:
          type: string
          enum: []  # injected at runtime from reference_contract.yml
        evidence:
          type: string
          enum: []  # injected at runtime from reference_contract.yml
        purpose:
          type: string
          minLength: 1
        trigger:
          type: string
          minLength: 1
        verification:
          type: string
          minLength: 1

  # --- CLI command fields ---
  command:
    type: string

  # --- Pipeline fields ---
  # `phases` shape is sketch-level; locked in after lifting first 2-3 pipelines.
  # Each phase is one of:
  #   { mold: "[[<slug>]]", loop?: bool }                  — Mold-shaped
  #   { branch: "<routing-pattern>", branches?: [...], chain?: [...] }  — [branch]
  # Future kinds (e.g. { gate: ... }) coined when first surfaced inline.
  phases:
    type: array
    minItems: 1
    items:
      type: object

  # --- Research fields (narrowed to component / design-problem / design-spec) ---
  subtype:
    type: string
  component:
    type: string

  # --- Schema (renderable JSON Schema reference) fields ---
  package:
    type: string
    description: "npm or PyPI package the schema is vendored from (omit for Foundry-authored)"
  upstream:
    type: string
    description: "URL to the source-of-truth schema upstream"
  package_export:
    type: string
    description: "For package-vendored schemas: the named runtime export from `package` that returns the JSON Schema object (e.g. `testsSchema`). cast-mold imports and stringifies this when resolving a typed `kind: schema` reference."

  # --- Vendoring fields (any note redistributing upstream content) ---
  # SPDX identifier of the content's license. Set on schema notes whose
  # `upstream` lives outside this repo, and on research notes that vendor a
  # structured upstream artifact alongside their prose.
  license:
    type: string
    enum: [MIT, Apache-2.0, BSD-2-Clause, BSD-3-Clause, AFL-3.0, GPL-2.0-only, GPL-3.0-only]
    description: "SPDX license identifier for the note's vendored content. The Foundry's own content is covered by the root LICENSE; this field annotates third-party redistributions."
  # Repo-relative path to the upstream LICENSE under LICENSES/. The validator
  # confirms the file exists and is non-empty.
  license_file:
    type: string
    pattern: "^LICENSES/[A-Za-z0-9._-]+(\\.LICENSE|\\.txt)?$"
    description: "Repo-relative path under LICENSES/ to the verbatim upstream LICENSE this note redistributes content under."

allOf:
  # mold requires name + axis
  - if:
      properties:
        type: { const: mold }
      required: [type]
    then:
      required: [name, axis]

  # source-specific molds require source
  - if:
      properties:
        type: { const: mold }
        axis: { const: source-specific }
      required: [type, axis]
    then:
      required: [source]

  # target-specific molds require target
  - if:
      properties:
        type: { const: mold }
        axis: { const: target-specific }
      required: [type, axis]
    then:
      required: [target]

  # tool-specific molds require tool
  - if:
      properties:
        type: { const: mold }
        axis: { const: tool-specific }
      required: [type, axis]
    then:
      required: [tool]

  # pattern requires title + pattern_kind + evidence
  - if:
      properties:
        type: { const: pattern }
      required: [type]
    then:
      required: [title, pattern_kind, evidence]

  # source-pattern requires source + target + source pattern metadata
  - if:
      properties:
        type: { const: source-pattern }
      required: [type]
    then:
      required: [title, source, target, source_pattern_kind, implemented_by_patterns]

  # cli-command requires tool + command
  - if:
      properties:
        type: { const: cli-command }
      required: [type]
    then:
      required: [tool, command]

  # pipeline requires title + phases
  - if:
      properties:
        type: { const: pipeline }
      required: [type]
    then:
      required: [title, phases]

  # research requires subtype (narrowed enum)
  - if:
      properties:
        type: { const: research }
      required: [type]
    then:
      required: [subtype]
      properties:
        subtype:
          enum: [component, design-problem, design-spec]

  # schema requires name + title
  - if:
      properties:
        type: { const: schema }
      required: [type]
    then:
      required: [name, title]

# Strict mode: unknown fields are rejected to catch typos and schema drift.
additionalProperties: false
