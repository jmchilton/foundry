name: Packages

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate content
        run: npm run validate

      - name: Run repo tests
        run: npm run test

      - name: Typecheck packages
        run: npm run packages-typecheck

      - name: Build packages
        run: npm run packages-build

      - name: Test packages
        run: npm run packages-test

      - name: Smoke-test schema package tarball
        run: npm run smoke:summary-nextflow-schema

      - name: Check package formatting
        run: npm run packages-format

      - name: Lint packages
        run: npm run packages-lint

      - name: Cast drift check
        run: npm run cast -- summarize-nextflow --check

      - name: Install site dependencies
        run: npm --prefix site ci

      - name: Build site
        run: npm run site:build
